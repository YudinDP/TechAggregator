<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - TechAggregator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" sizes="180x180" href="sources/logo.png">
</head>
<body>
    <header class="header">
    <div class="container">
        <div class="logo">
            <h1><a href="index.html" style="color: inherit; text-decoration: none; padding-right: 20%;">TechAggregator</a></h1>
        </div>
        <nav class="nav">
            <a href="index.html" class="nav-link" style="padding-left: 5%;">Главная</a>
            <a href="catalog.html" class="nav-link">Каталог</a>
            <a href="comparison.html" class="nav-link">Сравнение<span class="comparison-counter">0</span></a>
            <a href="recommendations.html" class="nav-link">Рекомендации</a>
        </nav>
        
        <!-- Добавляем поиск здесь -->
        <div class="nav-search-container">
            <input type="text" class="nav-search" id="navSearch" 
                   placeholder="Поиск товаров..." 
                   oninput="showNavSearchSuggestions()"
                   onkeypress="handleNavSearchEnter(event)">
            <button class="nav-search-btn" onclick="navSearchProducts()">
                🔍
            </button>
            <div id="navSearchSuggestions" class="nav-search-suggestions"></div>
        </div>
        
        <div class="auth-buttons">
    <a href="auth.html" class="btn btn-outline">Войти</a>
    <a href="auth.html?tab=register" class="btn btn-primary">Регистрация</a>
</div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="breadcrumbs">
                <a href="index.html">Главная</a> > 
                <a href="catalog.html">Каталог</a> > 
                <span id="productCategory">Смартфоны</span> > 
                <span id="productName">Название товара</span>
            </div>

            <div class="product-detail">
                <div class="product-gallery">
                    <div class="main-image">
                        <img id="mainProductImage" src="" alt="Основное изображение">
                    </div>
                </div>

                <div class="product-info">
                    <h1 id="productTitle">Название товара</h1>
                    <div class="product-rating">
                        <span class="rating-stars">★★★★★</span>
                        <span class="rating-value">4.5</span>
                    </div>

                    <div class="product-specs">
                        <h3>Основные характеристики</h3>
                        <div id="productSpecs" class="specs-list">
                            <!-- Характеристики будут загружены через JavaScript -->
                        </div>
                    </div>

                    
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="addCurrentProductToComparison()">Добавить к сравнению</button>
                <button class="btn btn-outline" onclick="addToFavorites()" id="favoriteBtn">В избранное</button>
                <button class="btn btn-secondary" onclick="requestProductAddition()" id="requestBtn">Запросить добавление</button>
            </div>

                </div>
            </div>

            <div class="price-comparison">
                <h2>Где купить</h2>
                <div id="priceList" class="price-list">
                    <!-- Список цен будет загружен через JavaScript -->
                </div>
            </div>

            <div class="reviews-section">
                <h2>Отзывы и вопросы</h2>
                <div class="reviews-actions">
                    <button class="btn btn-primary" onclick="addReview()">Оставить отзыв</button>
                    <button class="btn btn-outline" onclick="requestProductAddition()">Запросить добавление</button>
                </div>
                <div id="reviewsList" class="reviews-list">
                    <!-- Отзывы будут загружены через JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <!-- Модальное окно отзыва -->

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeReviewModal()">&times;</span>
        <h3>Оставить отзыв</h3>
        <form id="reviewForm">
            <div class="form-group">
                <label>Ваше имя</label>
                <input type="text" id="reviewName" required placeholder="Введите ваше имя">
            </div>
            <div class="form-group">
                <label>Оценка</label>
                <div class="star-rating" id="starRating">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>
                <input type="hidden" id="reviewRating" value="5" required>
                <div class="rating-value-display">Оценка: <span id="ratingValueDisplay">5</span>/5</div>
            </div>
            <div class="form-group">
                <label>Отзыв</label>
                <textarea id="reviewText" rows="5" placeholder="Расскажите о вашем опыте использования товара..." required></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeReviewModal()">Отмена</button>
                <button type="submit" class="btn btn-primary">Отправить отзыв</button>
            </div>
        </form>
    </div>
</div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 TechAggregator. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
