<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Избранное — TechAggregator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" sizes="180x180" href="sources/logo.png">
  <style>
    .favorites-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .product-card-favorite {
      display: flex;
      gap: 20px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      margin-bottom: 20px;
      background: white;
    }
    .product-image {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: #f8f9fa;
      border-radius: 8px;
      cursor: pointer;
    }
    .product-info {
      flex: 1;
    }
    .product-meta {
      display: flex;
      gap: 15px;
      margin: 10px 0;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .remove-favorite-btn {
      background: #ef4444;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-weight: bold;
      cursor: pointer;
      position: relative;
      top: -10px;
      left: -10px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      background: #f8f9fa;
      border-radius: 12px;
      margin: 40px 0;
      color: #6b7280;
    }
    .btn-small {
      padding: 6px 12px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
<header class="header">
  <div class="container">
    <div class="logo">
      <h1><a href="index.html">TechAggregator</a></h1>
    </div>
    <nav class="nav">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="catalog.html" class="nav-link">Каталог</a>
      <a href="comparison.html" class="nav-link">Сравнение<span class="comparison-counter">0</span></a>
      <a href="recommendations.html" class="nav-link">Рекомендации</a>
    </nav>
    <div class="auth-buttons">
      <a href="auth.html" class="btn btn-outline">Войти</a>
      <a href="auth.html?tab=register" class="btn btn-primary">Регистрация</a>
    </div>
  </div>
</header>

<main class="main">
  <div class="favorites-container">
    <h1>❤️ Моё избранное</h1>
    <div id="favoritesList"></div>
    <div id="emptyFavoritesState" class="empty-state" style="display: none;">
      <h3>Нет избранных товаров</h3>
      <p>Добавьте товары в избранное со страницы каталога или карточки товара</p>
      <a href="catalog.html" class="btn btn-primary" style="margin-top: 20px;">Перейти в каталог</a>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <p>&copy; 2024 TechAggregator. Все права защищены.</p>
  </div>
</footer>
<script src="config.js"></script>
<script src="script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function () {
  const token = localStorage.getItem('techAggregatorToken');
  if (!token) {
    alert('Пожалуйста, войдите в аккаунт');
    window.location.href = 'auth.html';
    return;
  }

  try {
    //Загружаем пользователя
    loadUserData();
    updateComparisonCounter();

    //Загружаем избранное
    const res = await fetch('http://localhost:3000/api/favorites', {
      headers: { Authorization: `Bearer ${token}` }
    });

    if (!res.ok) throw new Error('Не удалось загрузить избранное');

    const favorites = await res.json();
    renderFavorites(favorites);
  } catch (err) {
    console.error('Ошибка:', err);
    document.getElementById('favoritesList').innerHTML = '<p style="color: #ef4444;">Не удалось загрузить избранное</p>';
  }
});

//Отрисовка избранных товаров
function renderFavorites(favorites) {
  const listEl = document.getElementById('favoritesList');
  const emptyEl = document.getElementById('emptyFavoritesState');

  if (favorites.length === 0) {
    emptyEl.style.display = 'block';
    listEl.innerHTML = '';
    return;
  }

  emptyEl.style.display = 'none';


  listEl.innerHTML = favorites.map(fav => {
    //Получаем минимальную цену из текущих цен товара
    const currentMinPrice = getMinPrice(fav);

    let priceDropInfo = null;
    const lastPrice = fav.lastPrice || fav.price; //lastPrice — это цена при добавлении в избранное 
    if (lastPrice && currentMinPrice && currentMinPrice < lastPrice) {
      const dropPercentage = ((lastPrice - currentMinPrice) / lastPrice) * 100;
      if (dropPercentage >= 5) { // Порог 5%
        priceDropInfo = {
          percentage: dropPercentage.toFixed(1),
          oldPrice: lastPrice,
          newPrice: currentMinPrice
        };
      }
    }

    const imgSrc = fav.image || fav.imageUrl || 'https://via.placeholder.com/120x120?text=?';
    const cardClass = priceDropInfo ? 'product-card-favorite price-drop-highlight' : 'product-card-favorite';

    return `
      <div class="${cardClass}">
        <button class="remove-favorite-btn" onclick="removeFromFavorites(${fav.id})">×</button>
        <img src="${imgSrc}" 
             alt="${fav.name}" 
             class="product-image"
             onclick="window.location.href='product.html?id=${fav.id}'">
        <div class="product-info">
          <h3 onclick="window.location.href='product.html?id=${fav.id}'" style="cursor: pointer;">${fav.name}</h3>
          <div class="product-meta">
            <span>${getCategoryName(fav.category)}</span>
            <span>${formatPrice(currentMinPrice)} ₽</span>
          </div>
          ${priceDropInfo ? `<div class="price-drop-badge">Цена упала на ${priceDropInfo.percentage}%!</div>` : ''}
          <div class="product-actions" style="margin-top: 10px;">
            <button class="btn btn-primary btn-small" onclick="goToProduct(${fav.id})">Подробнее</button>
            <button class="btn btn-outline btn-small" onclick="addToComparison(${fav.id})">Сравнить</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

//Удаление из избранного
async function removeFromFavorites(productId) {
  const token = localStorage.getItem('techAggregatorToken');
  if (!token) return;

  try {
    const res = await fetch(`http://localhost:3000/api/favorites/${productId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });

    if (res.ok) {
      showCustomNotification('Удалено из избранного', 'info');
      //Перезагружаем список
      document.dispatchEvent(new Event('DOMContentLoaded'));
    } else {
      const data = await res.json();
      showCustomNotification(data.error || 'Ошибка удаления', 'error');
    }
  } catch (err) {
    showCustomNotification('Не удалось подключиться к серверу', 'error');
  }
}


function formatPrice(price) {
  if (price == null || isNaN(price)) return '—';
  return Number(price).toLocaleString('ru-RU');
}
function getMinPrice(product) {
  if (!product.prices || product.prices.length === 0) return null;
  return Math.min(...product.prices.map(p => p.price));
}
</script>
</body>
</html>
